<svg viewBox="0 0 720 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Furgoneta de mudanzas con plataforma elevadora">
  <defs>
    <linearGradient id="vanBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6fbd"/>
      <stop offset="100%" stop-color="#164379"/>
    </linearGradient>
  </defs>

  <ellipse cx="360" cy="560" rx="260" ry="26" fill="#182022" opacity="0.08"/>

  <!-- Cabina -->
  <path d="M90 300 L90 220 Q90 190 120 190 L200 190 Q225 190 240 215 L270 300 Z" fill="#e7eff8" stroke="#164379" stroke-width="4"/>
  <rect x="120" y="235" width="90" height="55" rx="8" fill="#bcd4ee" stroke="#164379" stroke-width="3"/>

  <!-- Caja de carga -->
  <rect x="255" y="150" width="360" height="220" rx="14" fill="url(#vanBody)" stroke="#122f57" stroke-width="4"/>
  <rect x="285" y="185" width="300" height="150" rx="6" fill="#3a7fc9" opacity="0.35"/>

  <!-- Logo simplificado en la caja -->
  <rect x="300" y="230" width="90" height="14" rx="7" fill="#f4f6f6"/>
  <rect x="300" y="255" width="60" height="10" rx="5" fill="#f4f6f6" opacity="0.7"/>

  <!-- Plataforma elevadora bajada, con cajas -->
  <rect x="600" y="330" width="90" height="14" rx="4" fill="#e0952e" stroke="#a8641a" stroke-width="3"/>
  <line x1="608" y1="344" x2="608" y2="380" stroke="#a8641a" stroke-width="6"/>
  <line x1="682" y1="344" x2="682" y2="380" stroke="#a8641a" stroke-width="6"/>

  <g>
    <rect x="612" y="290" width="40" height="40" rx="4" fill="#fbeed9" stroke="#e0952e" stroke-width="3"/>
    <rect x="612" y="290" width="40" height="14" fill="#e0952e" opacity="0.5"/>
    <rect x="655" y="300" width="34" height="30" rx="4" fill="#fbeed9" stroke="#e0952e" stroke-width="3"/>
  </g>

  <!-- Ruedas -->
  <circle cx="175" cy="380" r="34" fill="#182022"/>
  <circle cx="175" cy="380" r="14" fill="#55636a"/>
  <circle cx="520" cy="380" r="34" fill="#182022"/>
  <circle cx="520" cy="380" r="14" fill="#55636a"/>

  <!-- Chasis -->
  <rect x="110" y="360" width="470" height="26" rx="8" fill="#122f57"/>
</svg>
